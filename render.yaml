services:
  - type: web
    name: hangul-note-staff-omr
    runtime: docker
    plan: free
    region: singapore
    dockerfilePath: ./omr-server/Dockerfile
    dockerContext: ./omr-server
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "8080"
      - key: AUDIVERIS_BIN
        value: audiveris
      - key: OMR_MAX_FILE_MB
        value: "30"
      - key: OMR_TIMEOUT_MS
        value: "180000"
      - key: OMR_CORS_ORIGIN
        value: "*"
